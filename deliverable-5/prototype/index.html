<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Benji Payroll Prototype</title>
  <style>
    :root {
      --ink: #18212f;
      --muted: #647084;
      --line: #d8dde6;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --blue: #285ea8;
      --green: #237a57;
      --gold: #a36a00;
      --red: #b43636;
      --teal: #177d8d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid transparent;
      background: var(--blue);
      color: white;
      padding: 9px 13px;
      border-radius: 6px;
      cursor: pointer;
      min-height: 38px;
    }

    button.secondary {
      background: white;
      color: var(--ink);
      border-color: var(--line);
    }

    button.success { background: var(--green); }
    button.warning { background: var(--gold); }
    button.danger { background: var(--red); }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: white;
      color: var(--ink);
    }

    label {
      display: grid;
      gap: 5px;
      color: #344054;
      font-size: 14px;
      font-weight: 700;
    }

    textarea {
      min-height: 78px;
      resize: vertical;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 18px;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: 0;
      font-size: 20px;
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: #18212f;
      color: white;
      font-weight: 800;
    }

    nav {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    nav button {
      background: transparent;
      color: var(--ink);
      border-color: transparent;
      padding: 7px 9px;
    }

    nav button.active {
      background: #eef4ff;
      color: var(--blue);
      border-color: #c7d7f4;
    }

    .user-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
    }

    main {
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 22px 18px 40px;
    }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        linear-gradient(120deg, rgba(40, 94, 168, 0.12), transparent 38%),
        linear-gradient(300deg, rgba(35, 122, 87, 0.13), transparent 35%),
        var(--bg);
    }

    .login-panel {
      width: min(430px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 14px 32px rgba(24, 33, 47, 0.08);
    }

    .login-panel h1,
    .view-title h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin: 7px 0 0;
      line-height: 1.4;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-grid .full { grid-column: 1 / -1; }

    .stack {
      display: grid;
      gap: 14px;
    }

    .section {
      margin-top: 20px;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .view-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .panel, .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .panel {
      padding: 18px;
    }

    .card {
      padding: 16px;
      min-height: 100px;
    }

    .metric {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 800;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      align-items: start;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      table-layout: fixed;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: middle;
      overflow-wrap: anywhere;
    }

    th {
      color: #344054;
      font-size: 13px;
      background: #f1f3f6;
    }

    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .status.pending { color: var(--gold); background: #fff5dc; border-color: #f1d189; }
    .status.approved { color: var(--green); background: #e9f7ef; border-color: #b7e2ca; }
    .status.rejected { color: var(--red); background: #fdecec; border-color: #f1c1c1; }
    .status.flagged { color: var(--teal); background: #e8f7fa; border-color: #b8e2e8; }
    .status.active { color: var(--green); background: #e9f7ef; border-color: #b7e2ca; }
    .status.inactive { color: var(--red); background: #fdecec; border-color: #f1c1c1; }

    .toast {
      margin: 0 0 14px;
      padding: 11px 13px;
      border-radius: 7px;
      border: 1px solid #b7d2ff;
      background: #eef5ff;
      color: #164276;
      display: none;
    }

    .toast.show { display: block; }

    .error {
      color: var(--red);
      font-weight: 700;
      min-height: 20px;
      margin-top: 8px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .activity {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .activity li {
      border-left: 3px solid var(--line);
      padding-left: 10px;
      color: #344054;
      line-height: 1.35;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(24, 33, 47, 0.48);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 4;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(620px, 100%);
      background: white;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 20px;
      box-shadow: 0 18px 45px rgba(24, 33, 47, 0.24);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }

    .detail {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fbfcfe;
    }

    .detail span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .two-col { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .view-title { display: grid; }
      nav { justify-content: flex-start; }
      .topbar { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
      .login-panel { padding: 20px; }
      th:nth-child(4), td:nth-child(4) { display: none; }
    }

    @media print {
      header, button, .actions, .toast { display: none !important; }
      body { background: white; }
      main { padding: 0; }
      .panel, .card { border: none; }
      th { background: white; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const TODAY = "2026-07-19";
    const STORAGE_KEY = "benji-prototype-state-v1";

    const users = [
      { email: "emma.employee@benji.test", password: "Employee#123", name: "Emma Rivera", role: "EMPLOYEE", employeeId: 1 },
      { email: "admin.payroll@benji.test", password: "Admin#123", name: "Maya Chen", role: "ADMIN", employeeId: null }
    ];

    function defaultState() {
      return {
        currentUser: null,
        view: "login",
        toast: "",
        loginNotice: "",
        employees: [
          { id: 1, name: "Emma Rivera", role: "Robotics Instructor", rate: 25, federalTax: 0.12, stateTax: 0, active: true },
          { id: 2, name: "Noah Patel", role: "Math Tutor", rate: 22, federalTax: 0.10, stateTax: 0, active: true }
        ],
        entries: [
          { id: 101, employeeId: 2, date: "2026-07-13", hours: 6, program: "Math Tutoring", notes: "SAT prep group", status: "PENDING", reviewNote: "", submittedAt: "2026-07-13 17:31", stubId: null },
          { id: 102, employeeId: 1, date: "2026-07-12", hours: 4, program: "Robotics Workshop", notes: "Intro sensors lab", status: "APPROVED", reviewNote: "Approved for payroll.", submittedAt: "2026-07-12 16:10", stubId: 501 }
        ],
        paystubs: [
          { id: 501, employeeId: 1, period: "Jun 29 - Jul 12, 2026", hours: 38, gross: 950, deductions: 114, net: 836, payDate: "2026-07-15" }
        ],
        audit: ["Maya Chen approved Emma Rivera's 07/12 entry.", "System generated Jul 15 pay stub for Emma Rivera."],
        activeReviewId: null,
        editingEmployeeId: null,
        reportGenerated: false
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return Object.assign(defaultState(), JSON.parse(raw));
      } catch (err) {
        // Corrupted or unavailable storage falls back to seed data.
      }
      return defaultState();
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (err) {
        // Storage may be unavailable (private mode); prototype keeps working in memory.
      }
    }

    function resetDemoData() {
      try {
        localStorage.removeItem(STORAGE_KEY);
      } catch (err) {
        // Ignore storage errors on reset.
      }
      state = defaultState();
      state.loginNotice = "Demo data has been reset to the seeded scenario.";
      render();
    }

    let state = loadState();

    function nowStamp() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      return `${TODAY} ${hh}:${mm}`;
    }

    const root = document.getElementById("root");

    function money(value) {
      return value.toLocaleString("en-US", { style: "currency", currency: "USD" });
    }

    function employeeName(id) {
      return state.employees.find(e => e.id === id)?.name || "Unknown";
    }

    function esc(value) {
      return String(value).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function statusBadge(status) {
      return `<span class="status ${status.toLowerCase()}">${status}</span>`;
    }

    function showToast(message) {
      state.toast = message;
      render();
    }

    function setView(view) {
      state.view = view;
      state.toast = "";
      state.reportGenerated = false;
      render();
    }

    function login(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const email = form.get("email").trim();
      const password = form.get("password");
      const found = users.find(u => u.email === email && u.password === password);
      const error = document.getElementById("loginError");
      if (!found) {
        error.textContent = "Login failed. Check the email and password.";
        return;
      }
      state.currentUser = found;
      state.view = found.role === "ADMIN" ? "adminDashboard" : "employeeDashboard";
      state.toast = `Welcome, ${found.name}.`;
      state.loginNotice = "";
      render();
    }

    function logout() {
      state.currentUser = null;
      state.view = "login";
      state.toast = "";
      render();
    }

    function submitHours(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const date = form.get("date");
      const hours = Number(form.get("hours"));
      const program = form.get("program");
      const notes = form.get("notes").trim();
      const error = document.getElementById("entryError");
      error.textContent = "";

      const employeeRecord = state.employees.find(e => e.id === state.currentUser.employeeId);
      if (!employeeRecord || !employeeRecord.active) {
        error.textContent = "Your employee record is inactive. Contact the payroll administrator.";
        return;
      }
      if (date > TODAY) {
        error.textContent = "Future date not allowed.";
        return;
      }
      if (!hours || hours < 0.5 || hours > 24) {
        error.textContent = "Hours must be between 0.5 and 24.";
        return;
      }
      const duplicate = state.entries.some(e =>
        e.employeeId === state.currentUser.employeeId &&
        e.date === date &&
        e.program === program
      );
      if (duplicate) {
        error.textContent = "Duplicate entry detected for that date and program.";
        return;
      }

      state.entries.push({
        id: Date.now(),
        employeeId: state.currentUser.employeeId,
        date,
        hours,
        program,
        notes,
        status: "PENDING",
        reviewNote: "",
        submittedAt: nowStamp(),
        stubId: null
      });
      state.audit.unshift(`${state.currentUser.name} submitted ${hours} hours for ${program}.`);
      state.view = "myTimesheets";
      showToast("Entry submitted successfully and sent to the approval queue.");
    }

    function openReview(id) {
      state.activeReviewId = id;
      render();
      document.getElementById("reviewModal").classList.add("open");
    }

    function closeReview() {
      state.activeReviewId = null;
      render();
    }

    function saveDecision(decision) {
      const entry = state.entries.find(e => e.id === state.activeReviewId);
      const note = document.getElementById("reviewNote").value.trim();
      const error = document.getElementById("reviewError");
      if ((decision === "REJECTED" || decision === "FLAGGED") && !note) {
        error.textContent = "Reviewer notes are required for reject or flag decisions.";
        return;
      }
      entry.status = decision;
      entry.reviewNote = note || "Approved for payroll.";
      state.audit.unshift(`${state.currentUser.name} marked ${employeeName(entry.employeeId)}'s ${entry.date} entry as ${decision}.`);
      state.activeReviewId = null;
      state.view = "approvalQueue";
      showToast("Decision saved. The employee notification is now visible in My Timesheets.");
    }

    function generateReport() {
      const approved = state.entries.filter(e => e.status === "APPROVED");
      if (!approved.length) {
        showToast("No approved entries are available for this report.");
        return;
      }
      state.view = "report";
      state.reportGenerated = true;
      state.toast = "Report generated.";
      render();
    }

    function finalizePayRun() {
      const eligible = state.entries.filter(e => e.status === "APPROVED" && !e.stubId);
      if (!eligible.length) {
        showToast("All approved entries are already included in a pay stub.");
        return;
      }
      const byEmployee = new Map();
      eligible.forEach(e => {
        if (!byEmployee.has(e.employeeId)) byEmployee.set(e.employeeId, []);
        byEmployee.get(e.employeeId).push(e);
      });
      let created = 0;
      byEmployee.forEach((entries, employeeId) => {
        const emp = state.employees.find(item => item.id === employeeId);
        const hours = entries.reduce((sum, e) => sum + e.hours, 0);
        const gross = hours * emp.rate;
        const deductions = gross * (emp.federalTax + emp.stateTax);
        const stub = {
          id: Date.now() + created,
          employeeId,
          period: "Jul 13 - Jul 26, 2026",
          hours,
          gross,
          deductions,
          net: gross - deductions,
          payDate: "2026-07-29"
        };
        state.paystubs.push(stub);
        entries.forEach(e => { e.stubId = stub.id; });
        state.audit.unshift(`System generated the Jul 29 pay stub for ${emp.name} (${hours} hours).`);
        created += 1;
      });
      state.audit.unshift(`${state.currentUser.name} finalized the pay run for Jul 13 - Jul 26, 2026.`);
      showToast(`Pay run finalized. ${created} pay stub${created === 1 ? "" : "s"} generated for approved entries.`);
    }

    function navButton(view, label) {
      const active = state.view === view ? "active" : "";
      return `<button class="${active}" onclick="setView('${view}')">${label}</button>`;
    }

    function layout(content) {
      const user = state.currentUser;
      const nav = user.role === "ADMIN"
        ? `${navButton("adminDashboard", "Dashboard")}${navButton("approvalQueue", "Review Queue")}${navButton("employees", "Employees")}${navButton("report", "Reports")}`
        : `${navButton("employeeDashboard", "Dashboard")}${navButton("logHours", "Log Hours")}${navButton("myTimesheets", "My Timesheets")}${navButton("paystubs", "Pay Stubs")}`;

      return `
        <div class="app-shell">
          <header>
            <div class="topbar">
              <div class="brand"><div class="mark">B</div><div>Benji Payroll</div></div>
              <nav>
                ${nav}
                <span class="user-chip">${user.name} | ${user.role}</span>
                <button class="secondary" onclick="logout()">Log Out</button>
              </nav>
            </div>
          </header>
          <main>
            <div class="toast ${state.toast ? "show" : ""}">${state.toast}</div>
            ${content}
          </main>
        </div>
      `;
    }

    function loginView() {
      return `
        <div class="login-wrap">
          <section class="login-panel">
            <div class="brand"><div class="mark">B</div><div>Benji Payroll</div></div>
            <p class="subtitle">Internal payroll management system</p>
            <div class="toast ${state.loginNotice ? "show" : ""}" style="margin-top: 14px;">${state.loginNotice}</div>
            <form class="stack section" onsubmit="login(event)">
              <label>Email
                <input name="email" value="emma.employee@benji.test" autocomplete="username">
              </label>
              <label>Password
                <input name="password" type="password" value="Employee#123" autocomplete="current-password">
              </label>
              <button type="submit">Log In</button>
              <button type="button" class="secondary" onclick="quickAdmin()">Use Admin Login</button>
              <button type="button" class="secondary" onclick="resetDemoData()">Reset Demo Data</button>
              <div class="error" id="loginError"></div>
            </form>
          </section>
        </div>
      `;
    }

    function quickAdmin() {
      state.currentUser = users[1];
      state.view = "adminDashboard";
      state.toast = `Welcome, ${state.currentUser.name}.`;
      state.loginNotice = "";
      render();
    }

    function employeeDashboard() {
      const entries = state.entries.filter(e => e.employeeId === state.currentUser.employeeId);
      const pending = entries.filter(e => e.status === "PENDING").length;
      const approvedHours = entries.filter(e => e.status === "APPROVED").reduce((sum, e) => sum + e.hours, 0);
      return layout(`
        <div class="view-title">
          <div><h1>Employee Dashboard</h1><p class="subtitle">Current pay period: Jul 13 - Jul 26, 2026</p></div>
          <div class="actions"><button onclick="setView('logHours')">Log Hours</button><button class="secondary" onclick="setView('paystubs')">Pay Stubs</button></div>
        </div>
        <section class="grid">
          <div class="card"><div class="metric">Approved Hours</div><div class="value">${approvedHours}</div></div>
          <div class="card"><div class="metric">Pending Entries</div><div class="value">${pending}</div></div>
          <div class="card"><div class="metric">Latest Status</div><div class="value">${entries[entries.length - 1]?.status || "None"}</div></div>
          <div class="card"><div class="metric">Pay Stubs</div><div class="value">${state.paystubs.filter(p => p.employeeId === state.currentUser.employeeId).length}</div></div>
        </section>
        <section class="panel section">
          <h2>Recent Activity</h2>
          <ul class="activity">${entries.slice().reverse().map(e => `<li>${e.date}: ${e.hours} hours for ${e.program} - ${e.status}</li>`).join("")}</ul>
        </section>
      `);
    }

    function logHours() {
      return layout(`
        <div class="view-title"><div><h1>Log Hours</h1><p class="subtitle">Submit worked hours for the active pay period.</p></div></div>
        <section class="panel">
          <form class="form-grid" onsubmit="submitHours(event)">
            <label>Work Date
              <input type="date" name="date" value="2026-07-19">
            </label>
            <label>Hours Worked
              <input type="number" step="0.25" min="0.5" max="24" name="hours" value="3.5">
            </label>
            <label class="full">Program / Role
              <select name="program">
                <option>Robotics Workshop</option>
                <option>Coding Club</option>
                <option>Math Tutoring</option>
              </select>
            </label>
            <label class="full">Notes
              <textarea name="notes">Student lab support and cleanup.</textarea>
            </label>
            <div class="actions full">
              <button type="submit">Submit Entry</button>
              <button type="button" class="secondary" onclick="setView('employeeDashboard')">Cancel</button>
            </div>
            <div class="error full" id="entryError"></div>
          </form>
        </section>
      `);
    }

    function entriesTable(entries, admin = false) {
      return `
        <table>
          <thead>
            <tr>
              ${admin ? "<th>Employee</th>" : ""}
              <th>Date</th><th>Hours</th><th>Program</th><th>Status</th><th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${entries.map(e => `
              <tr>
                ${admin ? `<td>${employeeName(e.employeeId)}</td>` : ""}
                <td>${e.date}</td>
                <td>${e.hours}</td>
                <td>${e.program}</td>
                <td>${statusBadge(e.status)}</td>
                <td>${admin && e.status === "PENDING" ? `<button class="secondary" onclick="openReview(${e.id})">Review</button>` : `<button class="secondary" onclick="alert('${(e.reviewNote || "No reviewer note yet.").replace(/'/g, "\\'")}')">View</button>`}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function myTimesheets() {
      const entries = state.entries.filter(e => e.employeeId === state.currentUser.employeeId).slice().reverse();
      return layout(`
        <div class="view-title"><div><h1>My Timesheets</h1><p class="subtitle">Submitted entries and review outcomes.</p></div></div>
        <section class="panel">${entriesTable(entries)}</section>
      `);
    }

    function adminDashboard() {
      const pending = state.entries.filter(e => e.status === "PENDING").length;
      return layout(`
        <div class="view-title">
          <div><h1>Admin Dashboard</h1><p class="subtitle">Payroll operations for the current pay period.</p></div>
          <div class="actions"><button onclick="setView('approvalQueue')">Review Queue</button><button class="secondary" onclick="setView('report')">Reports</button></div>
        </div>
        <section class="grid">
          <div class="card"><div class="metric">Pending Approvals</div><div class="value">${pending}</div></div>
          <div class="card"><div class="metric">Active Employees</div><div class="value">${state.employees.filter(e => e.active).length}</div></div>
          <div class="card"><div class="metric">Approved Entries</div><div class="value">${state.entries.filter(e => e.status === "APPROVED").length}</div></div>
          <div class="card"><div class="metric">Audit Events</div><div class="value">${state.audit.length}</div></div>
        </section>
        <section class="panel section">
          <h2>Audit Trail</h2>
          <ul class="activity">${state.audit.map(item => `<li>${item}</li>`).join("")}</ul>
        </section>
      `);
    }

    function approvalQueue() {
      const entries = state.entries.slice().sort((a, b) => a.status.localeCompare(b.status));
      const active = state.entries.find(e => e.id === state.activeReviewId);
      const modal = active ? `
        <div class="modal-backdrop open" id="reviewModal">
          <section class="modal">
            <h2>Review Timesheet</h2>
            <div class="detail-grid">
              <div class="detail"><span>Employee</span>${employeeName(active.employeeId)}</div>
              <div class="detail"><span>Work Date</span>${active.date}</div>
              <div class="detail"><span>Hours</span>${active.hours}</div>
              <div class="detail"><span>Program</span>${active.program}</div>
            </div>
            <label>Note to Employee
              <textarea id="reviewNote">${active.reviewNote}</textarea>
            </label>
            <div class="error" id="reviewError"></div>
            <div class="actions section">
              <button class="success" onclick="saveDecision('APPROVED')">Approve</button>
              <button class="warning" onclick="saveDecision('FLAGGED')">Flag</button>
              <button class="danger" onclick="saveDecision('REJECTED')">Reject</button>
              <button class="secondary" onclick="closeReview()">Cancel</button>
            </div>
          </section>
        </div>
      ` : "";
      return layout(`
        <div class="view-title"><div><h1>Timesheet Approval Queue</h1><p class="subtitle">Review submitted time entries before payroll processing.</p></div></div>
        <section class="panel">${entriesTable(entries, true)}</section>
        ${modal}
      `);
    }

    function openEmployeeForm(id) {
      state.editingEmployeeId = id;
      render();
    }

    function closeEmployeeForm() {
      state.editingEmployeeId = null;
      render();
    }

    function saveEmployee(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const name = form.get("name").trim();
      const role = form.get("role").trim();
      const rate = Number(form.get("rate"));
      const federalTaxPct = Number(form.get("federalTax"));
      const error = document.getElementById("employeeError");
      error.textContent = "";

      if (!name || !role) {
        error.textContent = "Name and role are both required.";
        return;
      }
      if (!rate || rate < 1 || rate > 200) {
        error.textContent = "Hourly rate must be between 1 and 200.";
        return;
      }
      if (Number.isNaN(federalTaxPct) || federalTaxPct < 0 || federalTaxPct > 50) {
        error.textContent = "Federal tax must be between 0% and 50%.";
        return;
      }
      const duplicateName = state.employees.some(e =>
        e.id !== state.editingEmployeeId &&
        e.name.toLowerCase() === name.toLowerCase()
      );
      if (duplicateName) {
        error.textContent = "An employee with that name already exists.";
        return;
      }

      if (state.editingEmployeeId === "new") {
        state.employees.push({ id: Date.now(), name, role, rate, federalTax: federalTaxPct / 100, stateTax: 0, active: true });
        state.audit.unshift(`${state.currentUser.name} added employee ${name}.`);
      } else {
        const emp = state.employees.find(e => e.id === state.editingEmployeeId);
        emp.name = name;
        emp.role = role;
        emp.rate = rate;
        emp.federalTax = federalTaxPct / 100;
        state.audit.unshift(`${state.currentUser.name} updated the employee record for ${name}.`);
      }
      state.editingEmployeeId = null;
      showToast("Employee record saved.");
    }

    function toggleEmployeeActive(id) {
      const emp = state.employees.find(e => e.id === id);
      emp.active = !emp.active;
      state.audit.unshift(`${state.currentUser.name} ${emp.active ? "reactivated" : "deactivated"} employee ${emp.name}.`);
      showToast(`${emp.name} is now ${emp.active ? "ACTIVE" : "INACTIVE"}.`);
    }

    function employeesView() {
      const editingId = state.editingEmployeeId;
      const editingEmp = editingId && editingId !== "new" ? state.employees.find(e => e.id === editingId) : null;
      const modal = editingId ? `
        <div class="modal-backdrop open">
          <section class="modal">
            <h2>${editingEmp ? "Edit Employee" : "Add Employee"}</h2>
            <form class="form-grid" onsubmit="saveEmployee(event)">
              <label class="full">Full Name
                <input name="name" value="${editingEmp ? esc(editingEmp.name) : ""}">
              </label>
              <label class="full">Role / Program
                <input name="role" value="${editingEmp ? esc(editingEmp.role) : ""}">
              </label>
              <label>Hourly Rate (USD)
                <input type="number" name="rate" step="0.25" min="1" max="200" value="${editingEmp ? editingEmp.rate : 20}">
              </label>
              <label>Federal Tax (%)
                <input type="number" name="federalTax" step="1" min="0" max="50" value="${editingEmp ? Math.round(editingEmp.federalTax * 100) : 10}">
              </label>
              <div class="error full" id="employeeError"></div>
              <div class="actions full">
                <button type="submit">Save Employee</button>
                <button type="button" class="secondary" onclick="closeEmployeeForm()">Cancel</button>
              </div>
            </form>
          </section>
        </div>
      ` : "";
      return layout(`
        <div class="view-title">
          <div><h1>Employee Directory</h1><p class="subtitle">Employee records used for payroll calculation.</p></div>
          <button onclick="openEmployeeForm('new')">Add Employee</button>
        </div>
        <section class="panel">
          <table>
            <thead><tr><th>Name</th><th>Role</th><th>Rate</th><th>Federal Tax</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>
              ${state.employees.map(e => `
                <tr>
                  <td>${esc(e.name)}</td>
                  <td>${esc(e.role)}</td>
                  <td>${money(e.rate)}/hr</td>
                  <td>${Math.round(e.federalTax * 100)}%</td>
                  <td>${statusBadge(e.active ? "ACTIVE" : "INACTIVE")}</td>
                  <td><div class="actions">
                    <button class="secondary" onclick="openEmployeeForm(${e.id})">Edit</button>
                    <button class="secondary" onclick="toggleEmployeeActive(${e.id})">${e.active ? "Deactivate" : "Reactivate"}</button>
                  </div></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </section>
        ${modal}
      `);
    }

    function paystubs() {
      const stubs = state.paystubs
        .filter(p => p.employeeId === state.currentUser.employeeId)
        .slice()
        .sort((a, b) => b.payDate.localeCompare(a.payDate));
      return layout(`
        <div class="view-title"><div><h1>Pay Stub History</h1><p class="subtitle">Compensation history for finalized pay periods.</p></div></div>
        <section class="panel">
          <table>
            <thead><tr><th>Pay Date</th><th>Period</th><th>Hours</th><th>Gross</th><th>Deductions</th><th>Net</th></tr></thead>
            <tbody>${stubs.map(p => `<tr><td>${p.payDate}</td><td>${p.period}</td><td>${p.hours}</td><td>${money(p.gross)}</td><td>${money(p.deductions)}</td><td>${money(p.net)}</td></tr>`).join("")}</tbody>
          </table>
        </section>
      `);
    }

    function buildReportRows() {
      const approved = state.entries.filter(e => e.status === "APPROVED");
      const rows = approved.map(e => {
        const emp = state.employees.find(item => item.id === e.employeeId);
        const gross = e.hours * emp.rate;
        const deductions = gross * (emp.federalTax + emp.stateTax);
        return { employeeId: emp.id, name: emp.name, date: e.date, hours: e.hours, gross, deductions, net: gross - deductions };
      });
      const totals = rows.reduce((acc, row) => ({
        hours: acc.hours + row.hours,
        gross: acc.gross + row.gross,
        deductions: acc.deductions + row.deductions,
        net: acc.net + row.net
      }), { hours: 0, gross: 0, deductions: 0, net: 0 });
      return { rows, totals };
    }

    function csvField(value) {
      const text = String(value);
      return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function exportReportCsv() {
      const { rows, totals } = buildReportRows();
      if (!rows.length) {
        showToast("No approved entries are available to export.");
        return;
      }
      const lines = [
        ["Employee", "Date", "Approved Hours", "Gross Pay", "Deductions", "Net Pay"],
        ...rows.map(r => [r.name, r.date, r.hours, r.gross.toFixed(2), r.deductions.toFixed(2), r.net.toFixed(2)]),
        ["Total", "", totals.hours, totals.gross.toFixed(2), totals.deductions.toFixed(2), totals.net.toFixed(2)]
      ];
      const csv = lines.map(line => line.map(csvField).join(",")).join("\r\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "benji_payroll_report_2026-07-13_to_2026-07-26.csv";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
      state.audit.unshift(`${state.currentUser.name} exported the payroll report as CSV.`);
      showToast("Payroll report exported as CSV.");
    }

    function printReport() {
      state.audit.unshift(`${state.currentUser.name} printed the payroll report.`);
      saveState();
      window.print();
    }

    function reportView() {
      const { rows, totals } = buildReportRows();
      const reportBody = state.reportGenerated
        ? `<section class="panel">
          <table>
            <thead><tr><th>Employee</th><th>Date</th><th>Approved Hours</th><th>Gross Pay</th><th>Deductions</th><th>Net Pay</th></tr></thead>
            <tbody>
              ${rows.map(r => `<tr><td>${r.name}</td><td>${r.date}</td><td>${r.hours}</td><td>${money(r.gross)}</td><td>${money(r.deductions)}</td><td>${money(r.net)}</td></tr>`).join("")}
              <tr><th>Total</th><th></th><th>${totals.hours}</th><th>${money(totals.gross)}</th><th>${money(totals.deductions)}</th><th>${money(totals.net)}</th></tr>
            </tbody>
          </table>
        </section>`
        : `<section class="panel">
          <p class="subtitle">No report generated yet. Click <strong>Generate Report</strong> to build the payroll report for all approved entries in this pay period.</p>
        </section>`;
      const exportButtons = state.reportGenerated
        ? `<button class="secondary" onclick="exportReportCsv()">Export CSV</button>
           <button class="secondary" onclick="printReport()">Print / Save PDF</button>
           <button class="success" onclick="finalizePayRun()">Finalize Pay Run</button>`
        : "";
      return layout(`
        <div class="view-title">
          <div><h1>Payroll Report Generator</h1><p class="subtitle">Pay period: Jul 13 - Jul 26, 2026</p></div>
          <div class="actions"><button onclick="generateReport()">Generate Report</button>${exportButtons}</div>
        </div>
        ${reportBody}
      `);
    }

    function render() {
      saveState();
      if (!state.currentUser) {
        root.innerHTML = loginView();
        return;
      }
      const views = {
        employeeDashboard,
        logHours,
        myTimesheets,
        paystubs,
        adminDashboard,
        approvalQueue,
        employees: employeesView,
        report: reportView
      };
      root.innerHTML = (views[state.view] || employeeDashboard)();
    }

    render();
  </script>
</body>
</html>
